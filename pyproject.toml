[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
# Prompt text is long-form natural language by design; wrapping it would
# diverge from the exact wording specified in the requirements doc.
"app/prompts/system_prompt.py" = ["E501"]
"app/prompts/rag_prompt.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-report=html"
asyncio_mode = "auto"
